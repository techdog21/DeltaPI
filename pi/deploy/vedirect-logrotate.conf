# Log rotation template for the DeltaPI VE.Direct logger.
# Installed to /etc/logrotate.d/vedirect (root-owned, mode 644) by pi/deploy.py,
# which fills the __USER__ token below with the detected service user. Install with:
#   sudo python3 pi/deploy.py
#
# copytruncate is used because vedirect_logger.py holds the log open in append
# mode and has no SIGHUP/reopen handler — copytruncate rotates without needing
# to restart the service.
/var/log/vedirect/vedirect_error.log {
    # Owner of /var/log/vedirect — the user:group running the logger.
    su __USER__ __USER__
    daily
    maxsize 3M       # also rotate mid-day if it hits 3M, to cap an error/log spike
    rotate 3
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
