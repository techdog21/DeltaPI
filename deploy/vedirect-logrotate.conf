# Log rotation for the DeltaPI VE.Direct logger.
# Install on the Pi as /etc/logrotate.d/vedirect (root-owned, mode 644):
#   sudo cp deploy/vedirect-logrotate.conf /etc/logrotate.d/vedirect
#
# copytruncate is used because vedirect_logger.py holds the log open in append
# mode and has no SIGHUP/reopen handler — copytruncate rotates without needing
# to restart the service.
/var/log/vedirect/vedirect_error.log {
    # Owner of /var/log/vedirect — set to the user:group running the logger.
    su jerry jerry
    daily
    maxsize 3M       # also rotate mid-day if it hits 3M, to cap an error/log spike
    rotate 3
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
