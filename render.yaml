services:
  - type: web
    name: vedirect-api
    env: python
    plan: starter
    buildCommand: pip install -r server/requirements.txt
    startCommand: gunicorn --chdir server app:app --bind 0.0.0.0:$PORT
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: POST_SECRET      # bearer token shared with the Pi
        sync: false           # set at deploy time; never stored in the repo
      - key: FERNET_KEY       # key for date-range tokens
        sync: false
    # Optional env vars (HOME_LAT/LON, HOME_DISH_ID, FIRMS_MAP_KEY, SOLAR_KWP/PR)
    # are documented in the README — add them here or in the dashboard as needed.
