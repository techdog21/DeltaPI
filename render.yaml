services:
  - type: web
    name: vedirect-api
    env: python
    plan: starter
    buildCommand: pip install -r server/requirements.txt
    # --threads: the dashboard now loads progressively (/ shell, then /panels,
    # then /external), so the server must handle overlapping requests — with the
    # default single sync worker a slow /external would queue everything behind it.
    # One worker (not several) keeps the in-process render/API caches shared.
    startCommand: gunicorn --chdir server app:app --bind 0.0.0.0:$PORT --threads 4
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: POST_SECRET      # bearer token shared with the Pi
        sync: false           # set at deploy time; never stored in the repo
      - key: FERNET_KEY       # key for date-range tokens
        sync: false
      - key: ADMIN_SECRET     # gates the dashboard's location-editing routes
        sync: false           # set at deploy time; never stored in the repo
    # Optional env vars (HOME_LAT/LON, HOME_DISH_ID, FIRMS_MAP_KEY, SOLAR_KWP/PR)
    # are documented in the README — add them here or in the dashboard as needed.
