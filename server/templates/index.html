<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeltaPi Camping Monitor</title>
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="apple-touch-icon" href="/static/icon.png">
    <link rel="icon" type="image/png" href="/static/icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="DeltaPi">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script>
    // Theme: load from cookie or default to dark
    (function() {
        var match = document.cookie.match(/theme=(dark|light)/);
        var theme = match ? match[1] : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
    })();
    </script>
</head>
<body>

<div class="header">
    <h1>DELTAPI CAMPING MONITOR</h1>
    <div class="header-controls">
        <form method="get" onsubmit="event.preventDefault(); encryptAndSubmit();">
            <label>Last</label>
            <input type="number" id="daysInput" value="{{ days }}" min="1" max="{{ MAX_DAYS }}">
            <label>days</label>
            <input type="hidden" id="tokenInput" name="token">
            <button type="submit">Update</button>
        </form>
        <select id="locSelect" class="theme-toggle" onchange="setLocation(this)" style="padding:4px 6px;">
            <option value="auto" {% if active_loc_id|string == 'auto' %}selected{% endif %}>Location: Auto (GPS)</option>
            {% for loc in locations %}
            <option value="{{ loc['id'] }}" {% if active_loc_id|string == loc['id']|string %}selected{% endif %}>{{ loc['name'] }}{% if not loc['occupied'] %} · parked{% endif %}</option>
            {% endfor %}
            <option value="__gps__">📍 Use my location</option>
            <option value="__add__">➕ Add location…</option>
        </select>
        <button class="theme-toggle" onclick="toggleTheme()">Theme</button>
        <button class="theme-toggle" onclick="location.reload()">Refresh</button>
        <select id="autoRefresh" class="theme-toggle" onchange="setAutoRefresh(this.value)" style="padding:4px 6px;">
            <option value="0">Auto: Off</option>
            <option value="15">15s</option>
            <option value="30">30s</option>
            <option value="60">1m</option>
            <option value="120">2m</option>
            <option value="300">5m</option>
        </select>
    </div>
</div>

<!-- Served instantly with placeholder values (no DB/API work); dashboard.js then
     swaps in /panels (local data) and injects /external (weather & friends). -->
<div class="dashboard">
{% include "panels.html" %}
</div>

<script defer src="/static/dashboard.js"></script>
</body>
</html>
